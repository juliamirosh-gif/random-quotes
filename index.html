<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>The Little Prince Quotes</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@400;500;600&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="style.css" />
  </head>
  <body>
    <div class="stars"></div>
    <div class="container">
      <h1>The Little Prince</h1>
      <p class="subtitle">✦ A journey through the stars ✦</p>
      <div class="quote-box">
        <p id="quote">
          Click ✦ New Quote to begin your journey among the stars...
        </p>
        <p id="author"></p>
      </div>
      <div class="buttons">
        <button id="newQuote" class="btn">✦ New Quote ✦</button>
        <button id="favoriteQuote" class="heart-btn" hidden>♡</button>
        <button id="showFavorites" class="btn secondary">★ Favorites</button>
      </div>
    </div>
    <div id="favoritesModal" class="modal hidden">
      <div class="modal-content">
        <h2>Favorite Quotes</h2>

        <div id="favoritesList"></div>

        <button id="closeModal" class="btn">Close</button>
      </div>
    </div>
    <div class="b-612">
      <img src="images/b-612.png" alt="" />
    </div>
    <div class="rose">
      <img src="images/rose.png" alt="" />
    </div>
    <script src="script.js" type="module"></script>
  </body>
</html>
