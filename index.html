<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>The Little Prince Quotes</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@400;500;600&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="style.css" />
  </head>
  <body>
    <div class="stars"></div>
    <div class="container">
      <h1>The Little Prince</h1>
      <p class="subtitle">✦ A journey through the stars ✦</p>
      <div class="quote-box">
        <p id="quote"></p>
        <p id="author"></p>
      </div>
      <button id="newQuote" class="btn">✦ New Quote ✦</button>
    </div>
    <div class="b-612">
      <img src="images/b-612.png" alt="" />
    </div>
    <div class="rose">
      <img src="images/rose.png" alt="" />
    </div>
    <script src="script.js"></script>
  </body>
</html>
